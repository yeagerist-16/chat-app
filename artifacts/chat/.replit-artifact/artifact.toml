kind = "web"
previewPath = "/"
title = "Chat"
version = "1.0.0"
id = "artifacts/chat"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19605

[services.development]
run = "pnpm --filter @workspace/chat run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/chat", "run", "build" ]
publicDir = "artifacts/chat/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19605"
BASE_PATH = "/"
